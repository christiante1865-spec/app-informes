<!DOCTYPE html>
<html>
<head>
    <title>Nuevo Estudiante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">👤 Nuevo Estudiante</h1>

    <a href="/" class="btn btn-secondary mb-3">⬅ Volver al inicio</a>

    <!-- 🔥 MENSAJES -->
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="alert alert-warning">
        {{ messages[0] }}
    </div>
    {% endif %}
    {% endwith %}

    <div class="card shadow">
        <div class="card-body">

            <h5 class="card-title mb-4">Ingresar datos del estudiante</h5>

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Nombre completo</label>
                    <input type="text" name="nombre" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Edad</label>
                    <input type="number" name="edad" class="form-control" required min="3" max="100">
                </div>

                <button type="submit" class="btn btn-primary">
                    💾 Guardar estudiante
                </button>

            </form>

        </div>
    </div>

</div>

</body>
</html>
