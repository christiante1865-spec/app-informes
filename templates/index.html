<!DOCTYPE html>
<html>
<head>
    <title>Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

    <h1 class="mb-4 text-center text-md-start">📊 Sistema</h1>

    <div class="d-flex flex-column flex-md-row gap-2 mb-3">
        <a href="{{ url_for('crear_alumno') }}" class="btn btn-primary w-100">
            + Nuevo Alumno
        </a>
        <a href="{{ url_for('alumnos.listar_alumnos') }}" class="btn btn-secondary w-100">
            📚 Ver alumnos
        </a>
    </div>

    <div class="card shadow">
        <div class="card-body">

            <ul class="list-group">
                {% for e in alumnos %}
                <li class="list-group-item">

                    <div class="d-flex flex-column flex-md-row justify-content-between gap-2">

                        <div>
                            <strong>{{ e.nombre }}</strong> ({{ e.edad }} años)
                        </div>

                        <div class="d-flex flex-column flex-md-row gap-2">
                            <a href="{{ url_for('alumnos.perfil_alumno', id=e.id) }}" class="btn btn-info btn-sm w-100">Perfil</a>
                            <a href="{{ url_for('informes.crear_informe', alumno_id=e.id) }}" class="btn btn-success btn-sm w-100">Informe</a>
                            <a href="{{ url_for('subir_archivo', alumno_id=e.id) }}" class="btn btn-warning btn-sm w-100">Archivo</a>
                        </div>

                    </div>

                </li>
                {% endfor %}
            </ul>

        </div>
    </div>

</div>

</body>
</html>
