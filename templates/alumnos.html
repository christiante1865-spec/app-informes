<!DOCTYPE html>
<html>
<head>
    <title>Lista de alumnos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">📚 Lista de alumnos</h1>

    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary mb-3">⬅ Volver al inicio</a>

    <div class="card shadow">
        <div class="card-body">

            <h5 class="card-title mb-3">Listado completo</h5>

            <ul class="list-group">
                {% for alumno in alumnos %}
                <li class="list-group-item d-flex justify-content-between align-items-center">

                    <div>
                        <strong>{{ alumno["nombre"] }}</strong>
                        <span class="text-muted">({{ alumno["edad"] }} años)</span>
                    </div>

                    <div>
                        <!-- ✅ PERFIL CORREGIDO -->
                        <a href="{{ url_for('alumnos.perfil_alumno', id=alumno['id']) }}" class="btn btn-info btn-sm">
                            👁 Perfil
                        </a>

                        <!-- ✅ INFORME -->
                        <a href="{{ url_for('informes.crear_informe', alumno_id=alumno['id']) }}" class="btn btn-success btn-sm">
                            📝 Informe
                        </a>
                    </div>

                </li>
                {% endfor %}
            </ul>

        </div>
    </div>

</div>

</body>
</html>
