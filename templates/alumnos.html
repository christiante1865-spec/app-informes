<!DOCTYPE html>
<html>
<head>
    <title>Lista de alumnos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

    <h1 class="mb-4 text-center text-md-start">📚 Lista de alumnos</h1>

    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary w-100 w-md-auto mb-3">
        ⬅ Volver al inicio
    </a>

    <div class="card shadow">
        <div class="card-body">

            <ul class="list-group">
                {% for alumno in alumnos %}
                <li class="list-group-item">

                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">

                        <div>
                            <strong>{{ alumno["nombre"] }}</strong>
                            <span class="text-muted">({{ alumno["edad"] }} años)</span>
                        </div>

                        <div class="d-flex flex-column flex-md-row gap-2">
                            <a href="{{ url_for('alumnos.perfil_alumno', id=alumno['id']) }}" class="btn btn-info btn-sm w-100">
                                👁 Perfil
                            </a>

                            <a href="{{ url_for('informes.crear_informe', alumno_id=alumno['id']) }}" class="btn btn-success btn-sm w-100">
                                📝 Informe
                            </a>
                        </div>

                    </div>

                </li>
                {% endfor %}
            </ul>

        </div>
    </div>

</div>

</body>
</html>
