<!DOCTYPE html>
<html>
<head>
    <title>Alumnos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

    <h1 class="mb-4 text-center text-md-start">📚 Alumnos</h1>

    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary w-100 mb-3">
        ⬅ Volver al panel
    </a>

    <div class="card shadow">
        <div class="card-body">

            {% if alumnos %}
            <ul class="list-group">
                {% for alumno in alumnos %}
                <li class="list-group-item">

                    <div class="d-flex flex-column flex-md-row justify-content-between gap-2">

                        <div>
                            <strong>{{ alumno.nombre }}</strong> ({{ alumno.edad }} años)
                        </div>

                        <div class="d-flex flex-column flex-md-row gap-2">

                            <!-- PERFIL -->
                            <a href="{{ url_for('alumnos.perfil_alumno', id=alumno['id']) }}" 
                               class="btn btn-info btn-sm w-100">
                                Perfil
                            </a>

                            <!-- ✅ INFORME CORREGIDO -->
                            <a href="{{ url_for('informes.crear_informe', id=alumno['id']) }}" 
                               class="btn btn-success btn-sm w-100">
                                Informe
                            </a>

                            <!-- ✅ ARCHIVO CORREGIDO -->
                            <form action="{{ url_for('archivos.subir_archivo', id=alumno['id']) }}" 
                                  method="POST" 
                                  enctype="multipart/form-data"
                                  class="w-100">

                                <input type="file" name="archivo" class="form-control mb-1" required>

                                <button type="submit" class="btn btn-warning btn-sm w-100">
                                    Archivo
                                </button>
                            </form>

                        </div>

                    </div>

                </li>
                {% endfor %}
            </ul>
            {% else %}
                <p class="text-center text-muted">No hay alumnos aún.</p>
            {% endif %}

        </div>
    </div>

</div>

</body>
</html>
