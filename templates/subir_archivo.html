<!DOCTYPE html>
<html>

<head>
    <title>Subir archivo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

    <a href="/" class="btn btn-secondary w-100 mb-3">⬅ Volver</a>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div class="alert alert-success">
        {{ messages[0] }}
    </div>
    {% endif %}
    {% endwith %}

    <div class="card shadow">
        <div class="card-body">

            <h2 class="mb-3">📂 Subir informe</h2>

            <h5 class="text-muted mb-4">
                Estudiante: <strong>{{ alumno["nombre"] }}</strong>
            </h5>

            <form method="POST" enctype="multipart/form-data">

                <div class="mb-3">
                    <label>Archivo (PDF)</label>
                    <input type="file" name="archivo" class="form-control" required>
                </div>

                <button class="btn btn-warning w-100">
                    📤 Subir archivo
                </button>

            </form>

            <hr>

            <h6>📁 Archivos subidos</h6>

            <ul class="list-group mt-2">
                {% for archivo in archivos %}
                <li class="list-group-item">

                    <div class="d-flex flex-column flex-md-row justify-content-between gap-2">

                        <span>{{ archivo }}</span>

                        <div class="d-flex flex-column flex-md-row gap-2">
                            <a href="/uploads/{{ alumno_id }}/{{ archivo }}" 
                               class="btn btn-sm btn-outline-primary w-100"
                               target="_blank">
                                Ver
                            </a>

                            <a href="/eliminar_archivo/{{ alumno_id }}/{{ archivo }}" 
                               class="btn btn-sm btn-outline-danger w-100"
                               onclick="return confirm('¿Eliminar archivo?')">
                                Eliminar
                            </a>
                        </div>

                    </div>

                </li>
                {% endfor %}
            </ul>

        </div>
    </div>

</div>

</body>
</html>
